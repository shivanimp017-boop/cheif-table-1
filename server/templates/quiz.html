<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Quiz - Chef's Table</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Georgia', serif; min-height: 100vh; padding-bottom: 80px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; border-bottom: 1px solid #333; }
        .logo { font-size: 1.8rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: #fff; }
        .logo span { color: #c9a84c; }
        .back-btn { display: inline-block; padding: 8px 24px; border: 1px solid #444; color: #aaa; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; }
        .back-btn:hover { border-color: #c9a84c; color: #c9a84c; }
        .container { max-width: 600px; margin: 50px auto; padding: 0 20px; text-align: center; }
        .page-title h2 { font-size: 2rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 8px; }
        .page-title h2 span { color: #c9a84c; }
        .divider { width: 60px; height: 2px; background: #c9a84c; margin: 15px auto 30px; }
        .progress { font-size: 0.8rem; color: #777; letter-spacing: 2px; margin-bottom: 30px; }
        .progress span { color: #c9a84c; }
        .food-card { background: #111; border: 1px solid #333; padding: 50px 20px; margin-bottom: 30px; }
        .food-card .food-emoji { font-size: 5rem; margin-bottom: 20px; }
        .food-card h3 { font-size: 1.5rem; letter-spacing: 4px; text-transform: uppercase; color: #fff; }
        .vote-btns { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .vote-btn { flex: 1; max-width: 200px; padding: 16px; border: 2px solid #333; background: transparent; color: #ccc; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; font-family: 'Georgia', serif; }
        .vote-btn.like { border-color: #4caf50; color: #4caf50; }
        .vote-btn.like:hover { background: #4caf50; color: #000; }
        .vote-btn.dislike { border-color: #e53935; color: #e53935; }
        .vote-btn.dislike:hover { background: #e53935; color: #fff; }
        .result-box { background: #111; border: 1px solid #c9a84c; padding: 30px; display: none; }
        .result-box h3 { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; color: #c9a84c; margin-bottom: 20px; }
        .rec-item { display: flex; align-items: center; gap: 14px; padding: 14px; border-bottom: 1px solid #222; text-align: left; }
        .rec-item:last-child { border-bottom: none; }
        .rec-item .rec-emoji { font-size: 1.8rem; }
        .rec-item .rec-name { font-size: 0.9rem; letter-spacing: 1px; color: #fff; }
        .rec-item .rec-score { margin-left: auto; color: #c9a84c; font-size: 0.85rem; }
        .restart-btn { display: block; width: 100%; margin-top: 20px; padding: 14px; border: 2px solid #c9a84c; color: #c9a84c; background: transparent; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; font-family: 'Georgia', serif; }
        .restart-btn:hover { background: #c9a84c; color: #000; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; padding: 12px 0; z-index: 999; }
        .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: #777; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s; }
        .bottom-nav a:hover, .bottom-nav a.active { color: #c9a84c; }
        .bottom-nav .icon { font-size: 1.6rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Chef<span>'s</span> Table</a>
        <a href="/dashboard" class="back-btn">← Back</a>
    </nav>

    <div class="container">
        <div class="page-title">
            <h2>🎯 Food <span>Quiz</span></h2>
            <div class="divider"></div>
        </div>

        <div class="progress">Question <span id="current">1</span> of <span id="total">5</span></div>

        <div id="quizSection">
            <div class="food-card">
                <div class="food-emoji" id="foodEmoji"></div>
                <h3 id="foodName"></h3>
            </div>
            <div class="vote-btns">
                <button class="vote-btn like" onclick="vote('like')">👍 Love It</button>
                <button class="vote-btn dislike" onclick="vote('dislike')">👎 Not For Me</button>
            </div>
        </div>

        <div class="result-box" id="resultBox">
            <h3>🤖 AI Recommendations For You</h3>
            <div id="recList"></div>
            <button class="restart-btn" onclick="restartQuiz()">🔄 Retake Quiz</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="/dashboard"><span class="icon">🏠</span><span>Home</span></a>
        <a href="/detect"><span class="icon">📷</span><span>Camera</span></a>
        <a href="/profile"><span class="icon">👤</span><span>Profile</span></a>
    </div>

    <script>
        const foods = [
            { name: 'Chicken Curry',       emoji: '🍛', reward: 1.0 },
            { name: 'Margherita Pizza',     emoji: '🍕', reward: 1.0 },
            { name: 'Grilled Salmon',       emoji: '🐟', reward: 1.0 },
            { name: 'Caesar Salad',         emoji: '🥗', reward: 1.0 },
            { name: 'Chocolate Lava Cake',  emoji: '🍫', reward: 1.0 },
            { name: 'Beef Steak',           emoji: '🥩', reward: 1.0 },
            { name: 'Sushi Platter',        emoji: '🍣', reward: 1.0 },
            { name: 'Pasta Carbonara',      emoji: '🍝', reward: 1.0 },
        ];

        let shuffled = [...foods].sort(() => Math.random() - 0.5).slice(0, 5);
        let current = 0;

        function showQuestion() {
            document.getElementById('current').textContent = current + 1;
            document.getElementById('total').textContent = shuffled.length;
            document.getElementById('foodEmoji').textContent = shuffled[current].emoji;
            document.getElementById('foodName').textContent = shuffled[current].name;
        }

        function vote(action) {
            const food = shuffled[current];
            fetch('/rl_feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `recipe=${encodeURIComponent(food.name)}&action=${action}`
            });

            current++;
            if (current < shuffled.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizSection').style.display = 'none';
            fetch('/get_recommendations')
                .then(res => res.json())
                .then(data => {
                    const box = document.getElementById('resultBox');
                    box.style.display = 'block';
                    const emojis = {'veg': '🥗', 'nonveg': '🍖'};
                    document.getElementById('recList').innerHTML = data.items.map(r => `
                        <div class="rec-item">
                            <span class="rec-emoji">${emojis[r.category] || '🍽️'}</span>
                            <span class="rec-name">${r.name}</span>
                            <span class="rec-score">★ ${r.score}</span>
                        </div>
                    `).join('');
                });
        }

        function restartQuiz() {
            shuffled = [...foods].sort(() => Math.random() - 0.5).slice(0, 5);
            current = 0;
            document.getElementById('quizSection').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
            showQuestion();
        }

        showQuestion();
    </script>
</body>
</html>
