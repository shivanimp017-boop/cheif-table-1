name: chefs-table-ai
version: "1.0.0"
description: >
  Chef's Table AI is a recipe recommendation RL environment where a Q-Learning
  agent learns user food preferences over time using epsilon-greedy policy.

entry_point: inference:app

observation_space:
  type: object
  properties:
    recommendations:
      type: array
      description: List of recommended recipe names
    q_values:
      type: object
      description: Q-values for all recipes
    step:
      type: integer
      description: Current step count
    total_reward:
      type: number
      description: Cumulative reward so far
    task:
      type: string
      enum: [easy, medium, hard]
      description: Current task identifier
    task_score:
      type: number
      description: Normalized task completion score in [0, 1]
    task_progress:
      type: string
      description: Human-readable progress summary
    reward:
      type: number
      description: Reward from last action
    done:
      type: boolean
      description: Whether episode is complete

action_space:
  type: object
  properties:
    recipe:
      type: string
      description: Name of the recipe to interact with
    feedback:
      type: string
      enum: [like, dislike]
      description: User feedback on the recipe
    task:
      type: string
      enum: [easy, medium, hard]
      description: Optional task override for the step

tasks:
  - id: easy
    name: Like Popular Recipes
    description: Agent must like at least 3 unique recipes from the recommendation list
    max_steps: 10
    reward_range: [0.0, 1.0]

  - id: medium
    name: Balanced Preference Learning
    description: Agent must like veg and non-veg recipes equally (at least 2 each)
    max_steps: 15
    reward_range: [0.0, 1.0]

  - id: hard
    name: Maximize Q-Learning Score
    description: Agent must achieve a total reward above 5.0 within 20 steps
    max_steps: 20
    reward_range: [0.0, 1.0]

reward:
  like: 1.0
  dislike: -0.5
  partial_progress: 0.3

agent:
  algorithm: Q-Learning
  learning_rate: 0.3
  discount_factor: 0.9
  epsilon: 0.3
  epsilon_decay: 0.01
