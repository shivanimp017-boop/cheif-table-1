<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Chef's Table</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Georgia', serif; min-height: 100vh; padding-bottom: 80px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; border-bottom: 1px solid #333; }
        .logo { font-size: 1.8rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: #fff; }
        .logo span { color: #c9a84c; }
        .back-btn { display: inline-block; padding: 8px 24px; border: 1px solid #444; color: #aaa; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; }
        .back-btn:hover { border-color: #c9a84c; color: #c9a84c; }
        .container { max-width: 600px; margin: 50px auto; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 40px; }
        .page-title h2 { font-size: 2rem; letter-spacing: 5px; text-transform: uppercase; }
        .page-title h2 span { color: #c9a84c; }
        .divider { width: 60px; height: 2px; background: #c9a84c; margin: 15px auto 0; }
        .section-title { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: #c9a84c; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: #333; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 15px; background: #111; border: 1px solid #444; color: #fff; font-size: 0.95rem; font-family: 'Georgia', serif; outline: none; transition: border 0.3s; }
        input:focus { border-color: #c9a84c; }
        .save-btn { display: block; width: 100%; margin-top: 20px; padding: 14px; border: 2px solid #c9a84c; color: #c9a84c; background: transparent; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; font-family: 'Georgia', serif; }
        .save-btn:hover { background: #c9a84c; color: #000; }
        .success-msg { background: #0d1f0d; border: 1px solid #4caf50; color: #4caf50; padding: 14px 20px; text-align: center; font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 20px; display: none; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; padding: 12px 0; z-index: 999; }
        .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: #777; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s; }
        .bottom-nav a:hover, .bottom-nav a.active { color: #c9a84c; }
        .bottom-nav .icon { font-size: 1.6rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Chef<span>'s</span> Table</a>
        <a href="/dashboard" class="back-btn">← Back</a>
    </nav>

    <div class="container">
        <div class="page-title">
            <h2>⚙️ <span>Settings</span></h2>
            <div class="divider"></div>
        </div>

        <div class="success-msg" id="successMsg">✅ Settings saved successfully!</div>

        <!-- Update Profile -->
        <div class="section-title">👤 Update Profile</div>
        <form method="POST" action="/settings">
            <input type="hidden" name="action" value="profile">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ user.name or '' }}" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email or '' }}" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone" value="{{ user.phone or '' }}" placeholder="Enter your phone">
            </div>
            <button type="submit" class="save-btn">Save Profile</button>
        </form>

        <!-- Change Password -->
        <div class="section-title">🔒 Change Password</div>
        <form method="POST" action="/settings">
            <input type="hidden" name="action" value="password">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm new password">
            </div>
            {% if error %}<p style="color:#e53935; font-size:0.85rem; margin-bottom:10px;">{{ error }}</p>{% endif %}
            <button type="submit" class="save-btn">Change Password</button>
        </form>
    </div>

    <div class="bottom-nav">
        <a href="/dashboard"><span class="icon">🏠</span><span>Home</span></a>
        <a href="/detect"><span class="icon">📷</span><span>Camera</span></a>
        <a href="/profile"><span class="icon">👤</span><span>Profile</span></a>
    </div>

    <script>
        {% if success %}
        document.getElementById('successMsg').style.display = 'block';
        {% endif %}
    </script>
</body>
</html>
