<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera - Chef's Table</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
        }

        .logo span { color: #c9a84c; }

        .back-btn {
            display: inline-block;
            padding: 8px 24px;
            border: 1px solid #444;
            color: #aaa;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .back-btn:hover { border-color: #c9a84c; color: #c9a84c; }

        .hero {
            text-align: center;
            padding: 50px 20px 30px;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 70%);
            border-bottom: 1px solid #222;
        }

        .hero h2 {
            font-size: 2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero h2 span { color: #c9a84c; }

        .hero p { color: #777; font-size: 0.9rem; letter-spacing: 2px; }

        .divider { width: 60px; height: 2px; background: #c9a84c; margin: 15px auto; }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Option Buttons */
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .option-btn {
            flex: 1;
            padding: 20px;
            background: #111;
            border: 2px solid #333;
            color: #ccc;
            font-family: 'Georgia', serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .option-btn .btn-icon { font-size: 2rem; display: block; margin-bottom: 10px; }

        .option-btn:hover, .option-btn.active {
            border-color: #c9a84c;
            color: #c9a84c;
            background: #1a1500;
        }

        /* Panels */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Upload Panel */
        .upload-area {
            border: 2px dashed #444;
            padding: 50px 20px;
            text-align: center;
            transition: border 0.3s;
        }

        .upload-area:hover { border-color: #c9a84c; }

        .upload-area input { display: none; }

        .upload-area .up-icon { font-size: 3rem; margin-bottom: 15px; }

        .upload-area p { color: #777; font-size: 0.9rem; letter-spacing: 1px; }

        .upload-area p span { color: #c9a84c; }

        .preview-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            margin-top: 20px;
            display: none;
            border: 1px solid #333;
        }

        /* Camera Panel */
        #videoContainer {
            position: relative;
            background: #111;
            border: 1px solid #333;
            text-align: center;
        }

        #video {
            width: 100%;
            max-height: 340px;
            object-fit: cover;
            display: block;
        }

        #canvas { display: none; }

        .captured-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            display: none;
            border: 1px solid #333;
            margin-top: 10px;
        }

        .cam-controls {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        /* Action Buttons */
        .action-btn {
            flex: 1;
            padding: 13px;
            border: 2px solid #c9a84c;
            color: #c9a84c;
            background: transparent;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Georgia', serif;
        }

        .action-btn:hover { background: #c9a84c; color: #000; }

        .action-btn.red { border-color: #e53935; color: #e53935; }
        .action-btn.red:hover { background: #e53935; color: #fff; }

        /* Result */
        .result-box {
            margin-top: 30px;
            background: #111;
            border: 1px solid #333;
            padding: 24px;
            display: none;
        }

        .result-box.show { display: block; }

        .result-box h3 {
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #c9a84c;
            margin-bottom: 20px;
        }

        .result-box h3 span { color: #fff; }

        .nutrition-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .nutrition-item {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 14px 16px;
            text-align: center;
            min-width: 100px;
            flex: 1;
            transition: border 0.3s;
        }

        .nutrition-item:hover { border-color: #c9a84c; }

        .nutrition-item .nut-icon { font-size: 1.5rem; margin-bottom: 6px; }

        .nutrition-item .nut-value {
            font-size: 1.1rem;
            color: #c9a84c;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .nutrition-item .nut-label {
            font-size: 0.65rem;
            color: #777;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Food name input */
        .food-input-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .food-input-row input {
            flex: 1;
            padding: 12px 15px;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Georgia', serif;
            outline: none;
            transition: border 0.3s;
        }

        .food-input-row input:focus { border-color: #c9a84c; }

        .loading { color: #888; text-align: center; padding: 20px; letter-spacing: 2px; font-size: 0.85rem; display: none; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            background: #111;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            z-index: 999;
        }

        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            color: #777;
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .bottom-nav a:hover, .bottom-nav a.active { color: #c9a84c; }
        .bottom-nav .icon { font-size: 1.6rem; }

        /* Quick Links */
        .quick-links {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .quick-link {
            flex: 1;
            min-width: 140px;
            background: #111;
            border: 1px solid #333;
            padding: 20px 15px;
            text-align: center;
            text-decoration: none;
            color: #ccc;
            transition: all 0.3s;
        }

        .quick-link:hover { border-color: #c9a84c; color: #c9a84c; }
        .quick-link .ql-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
        .quick-link .ql-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">Chef<span>'s</span> Table</a>
        <a href="/dashboard" class="back-btn">← Back</a>
    </nav>

    <div class="hero">
        <div style="font-size:3rem; margin-bottom:10px;">📷</div>
        <h2>Detect <span>Food</span></h2>
        <div class="divider"></div>
        <p>Upload a photo or type food name to get nutrition details</p>
    </div>

    <div class="container">

        <!-- Option Buttons -->
        <div class="options">
            <button class="option-btn active" id="uploadBtn" onclick="switchPanel('upload')">
                <span class="btn-icon">📁</span>
                Upload Photo
            </button>
            <button class="option-btn" id="cameraBtn" onclick="switchPanel('camera')">
                <span class="btn-icon">📸</span>
                Take Photo
            </button>
        </div>

        <!-- Upload Panel -->
        <div class="panel active" id="uploadPanel">
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept="image/*" onchange="previewUpload(event)">
                <div class="up-icon">🖼️</div>
                <p>Click to browse files from your device</p>
                <p style="margin-top:8px; font-size:0.75rem;"><span>JPG, PNG, WEBP</span> supported</p>
            </div>
            <img id="uploadPreview" class="preview-img">
            <div style="display:flex; gap:12px; margin-top:15px;">
                <button class="action-btn" onclick="document.getElementById('fileInput').click()">📂 Browse Files</button>
                <button class="action-btn red" onclick="clearUpload()">✕ Clear</button>
            </div>
        </div>

        <!-- Camera Panel -->
        <div class="panel" id="cameraPanel">
            <div id="videoContainer">
                <video id="video" autoplay playsinline muted></video>
            </div>
            <canvas id="canvas"></canvas>
            <img id="capturedImg" class="captured-img">
            <div class="cam-controls">
                <button class="action-btn" id="captureBtn" onclick="capturePhoto()">📸 Capture</button>
                <button class="action-btn" onclick="detectFood('camera')">🔍 Detect Food</button>
                <button class="action-btn red" onclick="retakePhoto()">🔄 Retake</button>
            </div>
        </div>

        <!-- Food Name Input -->
        <div style="margin-top:20px; background:#111; border:1px solid #333; padding:20px;">
            <p style="font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; color:#c9a84c; margin-bottom:12px;">🔍 Or Type Food Name Directly</p>
            <div class="food-input-row">
                <input type="text" id="foodNameInput" placeholder="e.g. chicken, pizza, biryani, pav bhaji..." onkeyup="if(event.key==='Enter') getNutrition()">
                <button class="action-btn" style="flex:0; white-space:nowrap;" onclick="getNutrition()">🔍 Get Nutrition</button>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loadingMsg">🔍 Analysing...</div>

        <!-- Result -->
        <div class="result-box" id="resultBox">
            <h3>🍽️ Detected Food: <span id="foodName"></span></h3>

            <div class="nutrition-grid" id="nutritionGrid"></div>

            <div class="result-tags" id="resultTags"></div>
        </div>

    </div>

    <div class="bottom-nav">
        <a href="/dashboard"><span class="icon">🏠</span><span>Home</span></a>
        <a href="/detect" class="active"><span class="icon">📷</span><span>Camera</span></a>
        <a href="/profile"><span class="icon">👤</span><span>Profile</span></a>
    </div>

    <script>
        let stream = null;
        let capturedDataUrl = null;

        // Auto start camera only if HTTPS
        window.onload = function() {
            if (location.protocol === 'https:') {
                switchPanel('camera');
            }
        };

        function switchPanel(type) {
            document.getElementById('uploadPanel').classList.remove('active');
            document.getElementById('cameraPanel').classList.remove('active');
            document.getElementById('uploadBtn').classList.remove('active');
            document.getElementById('cameraBtn').classList.remove('active');
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('loadingMsg').style.display = 'none';

            if (type === 'upload') {
                document.getElementById('uploadPanel').classList.add('active');
                document.getElementById('uploadBtn').classList.add('active');
                stopCamera();
            } else {
                document.getElementById('cameraPanel').classList.add('active');
                document.getElementById('cameraBtn').classList.add('active');
                startCamera();
            }
        }

        function startCamera() {
            capturedDataUrl = null;
            document.getElementById('capturedImg').style.display = 'none';
            document.getElementById('video').style.display = 'block';
            document.getElementById('captureBtn').textContent = '📸 Capture';

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showCameraError();
                return;
            }

            // Try rear camera first, fallback to any camera
            const constraints = [{ video: { facingMode: 'environment' }, audio: false }, { video: true, audio: false }];

            function tryCamera(index) {
                if (index >= constraints.length) { showCameraError(); return; }
                navigator.mediaDevices.getUserMedia(constraints[index])
                    .then(s => {
                        stream = s;
                        const video = document.getElementById('video');
                        video.srcObject = s;
                        video.play();
                    })
                    .catch(err => {
                        if (err.name === 'NotAllowedError') {
                            document.getElementById('videoContainer').innerHTML = `
                                <div style="padding:40px; text-align:center; color:#e53935;">
                                    <div style="font-size:3rem; margin-bottom:15px;">🛋️</div>
                                    <p style="font-size:0.9rem; letter-spacing:1px;">Camera permission denied.</p>
                                    <p style="font-size:0.8rem; color:#777; margin-top:10px;">Go to browser settings → Allow camera for this site</p>
                                    <p style="font-size:0.8rem; color:#777; margin-top:5px;">Or use <b style="color:#c9a84c;">Upload Photo</b> instead</p>
                                </div>`;
                        } else {
                            tryCamera(index + 1);
                        }
                    });
            }
            tryCamera(0);
        }

        function showCameraError() {
            document.getElementById('videoContainer').innerHTML = `
                <div style="padding:40px; text-align:center; color:#777;">
                    <div style="font-size:3rem; margin-bottom:15px;">📷</div>
                    <p style="font-size:0.9rem; letter-spacing:1px;">Camera not available on HTTP.</p>
                    <p style="font-size:0.8rem; color:#555; margin-top:10px;">Use <b style="color:#c9a84c;">Upload Photo</b> or access via ngrok HTTPS link.</p>
                </div>`;
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            if (!stream) { alert('Camera is not active. Click Take Photo first.'); return; }
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedDataUrl = canvas.toDataURL('image/jpeg');
            const img = document.getElementById('capturedImg');
            img.src = capturedDataUrl;
            img.style.display = 'block';
            video.style.display = 'none';
            stopCamera();

            // Auto detect food from captured photo
            document.getElementById('loadingMsg').style.display = 'block';
            document.getElementById('resultBox').classList.remove('show');
            fetch('/detect_food', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: capturedDataUrl })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loadingMsg').style.display = 'none';
                if (data.food) {
                    document.getElementById('foodNameInput').value = data.food;
                    showNutrition(data);
                }
            })
            .catch(() => {
                document.getElementById('loadingMsg').style.display = 'none';
            });
        }

        function retakePhoto() {
            capturedDataUrl = null;
            document.getElementById('capturedImg').style.display = 'none';
            document.getElementById('resultBox').classList.remove('show');
            startCamera();
        }

        function previewUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.getElementById('uploadPreview');
                img.src = ev.target.result;
                img.style.display = 'block';
                // Auto detect food from image
                document.getElementById('loadingMsg').style.display = 'block';
                document.getElementById('resultBox').classList.remove('show');
                fetch('/detect_food', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: ev.target.result })
                })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('loadingMsg').style.display = 'none';
                    if (data.food) {
                        document.getElementById('foodNameInput').value = data.food;
                        showNutrition(data);
                    }
                })
                .catch(() => {
                    document.getElementById('loadingMsg').style.display = 'none';
                });
            };
            reader.readAsDataURL(file);
        }

        function clearUpload() {
            document.getElementById('fileInput').value = '';
            document.getElementById('uploadPreview').style.display = 'none';
            document.getElementById('resultBox').classList.remove('show');
        }

        function showNutrition(data) {
            const box = document.getElementById('resultBox');
            box.classList.add('show');
            document.getElementById('foodName').textContent = data.food;
            const n = data.nutrition;
            document.getElementById('nutritionGrid').innerHTML = `
                <div class="nutrition-item"><div class="nut-icon">&#128293;</div><div class="nut-value">${n.calories}</div><div class="nut-label">Calories</div></div>
                <div class="nutrition-item"><div class="nut-icon">&#128170;</div><div class="nut-value">${n.protein}g</div><div class="nut-label">Protein</div></div>
                <div class="nutrition-item"><div class="nut-icon">&#129704;</div><div class="nut-value">${n.fat}g</div><div class="nut-label">Fat</div></div>
                <div class="nutrition-item"><div class="nut-icon">&#127838;</div><div class="nut-value">${n.carbs}g</div><div class="nut-label">Carbs</div></div>
                <div class="nutrition-item"><div class="nut-icon">&#127807;</div><div class="nut-value">${n.fiber}g</div><div class="nut-label">Fiber</div></div>
                <div class="nutrition-item"><div class="nut-icon">&#127818;</div><div class="nut-value">${n.vitamin_c}mg</div><div class="nut-label">Vitamin C</div></div>
                <div class="nutrition-item"><div class="nut-icon">&#129365;</div><div class="nut-value">${n.vitamin_a}mcg</div><div class="nut-label">Vitamin A</div></div>
                <div class="nutrition-item"><div class="nut-icon">&#129748;</div><div class="nut-value">${n.calcium}mg</div><div class="nut-label">Calcium</div></div>
                <div class="nutrition-item"><div class="nut-icon">&#129706;</div><div class="nut-value">${n.iron}mg</div><div class="nut-label">Iron</div></div>
            `;
        }

        function getNutrition() {
            const food = document.getElementById('foodNameInput').value.trim();
            if (!food) { alert('Please enter a food name.'); return; }
            sendDetect(food);
        }

        function detectFood(source) {
            const food = document.getElementById('foodNameInput').value.trim();
            if (!food) { alert('Please enter the food name in the box below first.'); return; }
            sendDetect(food);
        }

        function sendDetect(foodName) {
            document.getElementById('loadingMsg').style.display = 'block';
            document.getElementById('resultBox').classList.remove('show');

            fetch('/detect_food', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ food_name: foodName })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loadingMsg').style.display = 'none';
                showNutrition(data);
            })
            .catch(() => {
                document.getElementById('loadingMsg').style.display = 'none';
                alert('Could not fetch nutrition. Try again.');
            });
        }
    </script>

</body>
</html>
