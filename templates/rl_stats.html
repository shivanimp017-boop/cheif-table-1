<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Stats - Chef's Table</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Georgia', serif; min-height: 100vh; padding-bottom: 80px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; border-bottom: 1px solid #333; }
        .logo { font-size: 1.8rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: #fff; }
        .logo span { color: #c9a84c; }
        .back-btn { display: inline-block; padding: 8px 24px; border: 1px solid #444; color: #aaa; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; }
        .back-btn:hover { border-color: #c9a84c; color: #c9a84c; }
        .container { max-width: 700px; margin: 50px auto; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 40px; }
        .page-title h2 { font-size: 2rem; letter-spacing: 5px; text-transform: uppercase; }
        .page-title h2 span { color: #c9a84c; }
        .divider { width: 60px; height: 2px; background: #c9a84c; margin: 15px auto 0; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 140px; background: #111; border: 1px solid #333; padding: 24px; text-align: center; }
        .stat-box .stat-icon { font-size: 2rem; margin-bottom: 10px; }
        .stat-box .stat-value { font-size: 1.8rem; color: #c9a84c; font-weight: bold; margin-bottom: 6px; }
        .stat-box .stat-label { font-size: 0.7rem; color: #777; letter-spacing: 2px; text-transform: uppercase; }
        .section-title { font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; color: #c9a84c; margin: 30px 0 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: #333; }
        .recipe-bar { margin-bottom: 14px; }
        .recipe-bar .bar-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.82rem; color: #ccc; }
        .recipe-bar .bar-label span { color: #c9a84c; }
        .bar-track { background: #222; height: 8px; border-radius: 0; }
        .bar-fill { height: 8px; background: linear-gradient(to right, #c9a84c, #f0d080); transition: width 1s ease; }
        .bar-fill.negative { background: linear-gradient(to right, #e53935, #ff6b6b); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; padding: 12px 0; z-index: 999; }
        .bottom-nav a { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: #777; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s; }
        .bottom-nav a:hover, .bottom-nav a.active { color: #c9a84c; }
        .bottom-nav .icon { font-size: 1.6rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Chef<span>'s</span> Table</a>
        <a href="/dashboard" class="back-btn">← Back</a>
    </nav>

    <div class="container">
        <div class="page-title">
            <h2>📈 RL <span>Stats</span></h2>
            <div class="divider"></div>
        </div>

        <!-- Summary Stats -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-icon">🤖</div>
                <div class="stat-value">{{ total_recipes }}</div>
                <div class="stat-label">Recipes Learned</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">👍</div>
                <div class="stat-value">{{ liked }}</div>
                <div class="stat-label">Liked</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">👎</div>
                <div class="stat-value">{{ disliked }}</div>
                <div class="stat-label">Disliked</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">🎯</div>
                <div class="stat-value">{{ accuracy }}%</div>
                <div class="stat-label">AI Accuracy</div>
            </div>
        </div>

        <!-- Q-Value Chart -->
        <div class="section-title">🧠 AI Preference Scores</div>
        {% for recipe, score in q_scores %}
        <div class="recipe-bar">
            <div class="bar-label">
                <span>{{ recipe }}</span>
                <span>{{ score }}</span>
            </div>
            <div class="bar-track">
                <div class="bar-fill {{ 'negative' if score < 0 else '' }}"
                     style="width: {{ [[(score * 100)|int, 0]|max, 100]|min }}%"></div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="bottom-nav">
        <a href="/dashboard"><span class="icon">🏠</span><span>Home</span></a>
        <a href="/detect"><span class="icon">📷</span><span>Camera</span></a>
        <a href="/profile"><span class="icon">👤</span><span>Profile</span></a>
    </div>
</body>
</html>
